<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyPulse</title>
    <link rel="icon" type="image/png" href="/static/icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <script>
      // Apply theme immediately to prevent flashing
      if (
        localStorage.getItem("tinypulse-theme") === "dark" ||
        (!("tinypulse-theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <style>
      .pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      /* Custom scrollbar for small lists */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen transition-colors duration-200"
  >
    <div class="max-w-6xl mx-auto px-4 py-8">
      <!-- Header & Navigation -->
      <div
        class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8"
      >
        <div class="flex items-center gap-3">
          <img
            src="/static/icon.png"
            alt="TinyPulse"
            class="w-10 h-10 rounded-lg shadow-sm"
          />
          <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
              TinyPulse
            </h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
              Self-hosted uptime monitoring
            </p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <!-- GitHub Link -->
          <a
            href="https://github.com/AkaCoder404/tinypulse"
            target="_blank"
            rel="noopener noreferrer"
            class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition"
            title="GitHub Repository"
          >
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path
                fill-rule="evenodd"
                d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </a>

          <!-- Theme Toggle -->
          <div class="relative">
            <button
              onclick="toggleThemeMenu()"
              id="theme-btn"
              class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition p-1"
              title="Toggle Theme"
            >
              <svg
                id="theme-icon-light"
                class="w-6 h-6 hidden dark:block"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                ></path>
              </svg>
              <svg
                id="theme-icon-dark"
                class="w-6 h-6 block dark:hidden"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
                ></path>
              </svg>
            </button>
            <div
              id="theme-menu"
              class="absolute right-0 mt-2 w-36 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 hidden z-50"
            >
              <button
                onclick="setTheme('light')"
                class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-t-lg"
              >
                Light
              </button>
              <button
                onclick="setTheme('dark')"
                class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700"
              >
                Dark
              </button>
              <button
                onclick="setTheme('system')"
                class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-b-lg border-t border-gray-100 dark:border-gray-700"
              >
                System
              </button>
            </div>
          </div>

          <!-- Tabs -->
          <div
            class="flex gap-2 bg-white dark:bg-gray-800 p-1 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 ml-2"
          >
            <button
              onclick="switchTab('endpoints')"
              id="tab-endpoints"
              class="px-4 py-2 rounded-md text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-white transition"
            >
              Endpoints
            </button>
            <button
              onclick="switchTab('notifiers')"
              id="tab-notifiers"
              class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-700/50 transition"
            >
              Notifiers
            </button>
          </div>
        </div>
      </div>

      <!-- Endpoints View -->
      <div id="view-endpoints">
        <!-- Overview + Toolbar -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
          <div class="flex items-center gap-3 text-sm">
            <span class="flex items-center gap-1.5 text-gray-600 dark:text-gray-400">
              <span class="w-2 h-2 rounded-full bg-green-500"></span>
              <span id="count-up">0</span> Up
            </span>
            <span class="flex items-center gap-1.5 text-gray-600 dark:text-gray-400">
              <span class="w-2 h-2 rounded-full bg-red-500"></span>
              <span id="count-down">0</span> Down
            </span>
            <span class="flex items-center gap-1.5 text-gray-600 dark:text-gray-400">
              <span class="w-2 h-2 rounded-full bg-yellow-500"></span>
              <span id="count-paused">0</span> Paused
            </span>
          </div>
          <div class="flex items-center gap-2">
            <div class="relative">
              <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
              <input type="text" id="endpoint-search" placeholder="Search..." oninput="filterEndpoints()"
                class="pl-8 pr-3 py-1.5 text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 w-36 sm:w-48">
            </div>
            <select id="endpoint-filter" onchange="filterEndpoints()"
              class="text-sm bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 border border-gray-200 dark:border-gray-700 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-green-500">
              <option value="all">All</option>
              <option value="up">Up</option>
              <option value="down">Down</option>
              <option value="paused">Paused</option>
            </select>
            <button onclick="openEndpointModal()"
              class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span class="hidden sm:inline">Add</span>
            </button>
          </div>
        </div>
        <div id="endpoints-container" class="space-y-3">
          <!-- Cards injected here -->
        </div>
      </div>

      <!-- Notifiers View -->
      <div id="view-notifiers" class="hidden">
        <div class="flex justify-end mb-4">
          <button
            onclick="openNotifierModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium shadow-sm transition flex items-center gap-1.5"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              ></path>
            </svg>
            <span class="hidden sm:inline">Add</span>
          </button>
        </div>
        <div
          id="notifiers-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
        >
          <!-- Cards injected here -->
        </div>
      </div>
    </div>

    <!-- Endpoint Modal -->
    <div
      id="modal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 transition-opacity duration-200"
    >
      <div
        class="bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-transparent dark:border-gray-700 w-full max-w-md p-6 max-h-[90vh] overflow-y-auto"
      >
        <h2
          id="modal-title"
          class="text-xl font-semibold mb-4 text-gray-900 dark:text-white"
        >
          Add Endpoint
        </h2>
        <form
          id="endpoint-form"
          onsubmit="saveEndpoint(event)"
          class="space-y-4"
        >
          <input type="hidden" id="endpoint-id" />
          <div class="grid grid-cols-3 gap-4">
            <div class="col-span-1">
              <label
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                >Type</label
              >
              <select
                id="type"
                required
                onchange="updateEndpointFormFields()"
                class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
              >
                <option value="http">HTTP/S</option>
                <option value="tcp">TCP Port</option>
              </select>
            </div>
            <div class="col-span-2">
              <label
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                >Name</label
              >
              <input
                type="text"
                id="name"
                required
                placeholder="e.g., Production API"
                class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
              />
            </div>
          </div>
          <div>
            <label id="url-label"
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >URL</label
            >
            <input
              type="text"
              id="url"
              required
              placeholder="https://api.example.com/health"
              class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
            />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                >Interval (sec)</label
              >
              <input
                type="number"
                id="interval"
                required
                min="10"
                value="60"
                class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
              />
            </div>
            <div>
              <label
                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
                >Fail Threshold</label
              >
              <input
                type="number"
                id="fail-threshold"
                required
                min="1"
                value="3"
                title="Number of consecutive failures before alerting"
                class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-500"
              />
            </div>
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
              >Alert Channels</label
            >
            <div
              id="endpoint-notifiers-list"
              class="space-y-2 max-h-32 overflow-y-auto border border-gray-200 dark:border-gray-700 rounded-lg p-3 bg-gray-50 dark:bg-gray-900/50 text-sm"
            >
              <!-- Checkboxes injected here -->
              <div class="text-gray-500 dark:text-gray-400 italic">
                Loading notifiers...
              </div>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
              Select where alerts should be sent when this endpoint goes down.
            </p>
          </div>

          <div
            class="flex justify-end gap-3 pt-4 border-t border-gray-100 dark:border-gray-700"
          >
            <button
              type="button"
              onclick="closeModal()"
              class="px-4 py-2 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium transition"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-4 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white font-medium transition"
            >
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Notifier Modal -->
    <div
      id="notifier-modal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 transition-opacity duration-200"
    >
      <div
        class="bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-transparent dark:border-gray-700 w-full max-w-md p-6 max-h-[90vh] overflow-y-auto"
      >
        <h2
          id="notifier-modal-title"
          class="text-xl font-semibold mb-4 text-gray-900 dark:text-white"
        >
          Add Notifier
        </h2>
        <form
          id="notifier-form"
          onsubmit="saveNotifier(event)"
          class="space-y-4"
        >
          <input type="hidden" id="notifier-id" />
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Name</label
            >
            <input
              type="text"
              id="notifier-name"
              required
              placeholder="e.g., Ops Team Telegram"
              class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"
              >Type</label
            >
            <select
              id="notifier-type"
              required
              onchange="renderNotifierFields()"
              class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
              <option value="TELEGRAM">Telegram</option>
              <option value="PUSHOVER">Pushover</option>
            </select>
          </div>

          <!-- Dynamic fields injected here -->
          <div
            id="notifier-dynamic-fields"
            class="space-y-4 bg-blue-50/50 dark:bg-blue-900/10 p-3 rounded-lg border border-blue-100 dark:border-blue-900/30"
          ></div>

          <div
            class="flex justify-end gap-3 pt-4 border-t border-gray-100 dark:border-gray-700"
          >
            <button
              type="button"
              onclick="closeNotifierModal()"
              class="px-4 py-2 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium transition"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium transition"
            >
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Detail Modal -->
    <div
      id="detail-modal"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4 transition-opacity duration-200"
    >
      <div
        class="bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-transparent dark:border-gray-700 w-full max-w-2xl p-6 max-h-[80vh] overflow-hidden flex flex-col"
      >
        <div class="flex items-center justify-between mb-4 flex-shrink-0">
          <h2
            id="detail-title"
            class="text-xl font-semibold text-gray-900 dark:text-white"
          >
            History
          </h2>
          <button
            onclick="closeDetail()"
            class="text-gray-400 hover:text-gray-800 dark:hover:text-gray-100 text-2xl leading-none p-1 transition"
          >
            &times;
          </button>
        </div>
        <div
          class="overflow-y-auto flex-1 border border-gray-200 dark:border-gray-700 rounded-lg"
        >
          <table class="min-w-full text-sm">
            <thead
              class="bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 sticky top-0 shadow-sm"
            >
              <tr>
                <th class="px-4 py-3 text-left font-medium">Time</th>
                <th class="px-4 py-3 text-left font-medium">Status</th>
                <th class="px-4 py-3 text-left font-medium">Code</th>
                <th class="px-4 py-3 text-left font-medium">Response Time</th>
              </tr>
            </thead>
            <tbody
              id="detail-body"
              class="divide-y divide-gray-100 dark:divide-gray-700 bg-white dark:bg-gray-800"
            >
              <!-- rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
        let globalNotifiers = []; // Cache to populate the endpoint modal
        let allEndpoints = [];    // Raw data for filtering
        let refreshInterval;

        // --- Theme Management ---
      function toggleThemeMenu() {
        const menu = document.getElementById('theme-menu');
        menu.classList.toggle('hidden');
      }

      function setTheme(theme) {
        if (theme === 'system') {
          localStorage.removeItem('tinypulse-theme');
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } else {
          localStorage.setItem('tinypulse-theme', theme);
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        }
        toggleThemeMenu();
      }

      // Close theme menu if clicking outside
      document.addEventListener('click', (event) => {
        const btn = document.getElementById('theme-btn');
        const menu = document.getElementById('theme-menu');
        if (btn && menu && !btn.contains(event.target) && !menu.contains(event.target)) {
          menu.classList.add('hidden');
        }
      });

      // --- Tab Management ---
        function switchTab(tab) {
          document
            .getElementById("view-endpoints")
            .classList.toggle("hidden", tab !== "endpoints");
          document
            .getElementById("view-notifiers")
            .classList.toggle("hidden", tab !== "notifiers");

          const tabEndpoints = document.getElementById("tab-endpoints");
          const tabNotifiers = document.getElementById("tab-notifiers");

          if (tab === "endpoints") {
            tabEndpoints.className =
              "px-4 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-900 transition";
            tabNotifiers.className =
              "px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 transition";
            fetchEndpoints();
          } else {
            tabEndpoints.className =
              "px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-50 transition";
            tabNotifiers.className =
              "px-4 py-2 rounded-md text-sm font-medium bg-gray-100 text-gray-900 transition";
            fetchNotifiers();
          }
        }

        // --- Endpoints Logic ---
        async function fetchEndpoints() {
          if (
            document.getElementById("view-endpoints").classList.contains("hidden")
          )
            return;
          try {
            const res = await fetch("/api/endpoints");
            const data = await res.json();
            allEndpoints = data;
            filterEndpoints();
          } catch (e) {
            console.error("fetch error", e);
          }
        }

        function filterEndpoints() {
          const search = document.getElementById('endpoint-search').value.toLowerCase();
          const filter = document.getElementById('endpoint-filter').value;

          let filtered = allEndpoints;

          if (filter !== 'all') {
            if (filter === 'up') filtered = filtered.filter(ep => ep.is_up === true && !ep.paused);
            if (filter === 'down') filtered = filtered.filter(ep => ep.is_up === false && !ep.paused);
            if (filter === 'paused') filtered = filtered.filter(ep => ep.paused);
          }

          if (search) {
            filtered = filtered.filter(ep =>
              ep.name.toLowerCase().includes(search) ||
              ep.url.toLowerCase().includes(search)
            );
          }

          renderEndpoints(filtered);
        }

        function renderEndpoints(endpoints) {
          const container = document.getElementById("endpoints-container");

          // Update counts from all endpoints
          const upCount = allEndpoints.filter(ep => ep.is_up === true && !ep.paused).length;
          const downCount = allEndpoints.filter(ep => ep.is_up === false && !ep.paused).length;
          const pausedCount = allEndpoints.filter(ep => ep.paused).length;
          document.getElementById('count-up').textContent = upCount;
          document.getElementById('count-down').textContent = downCount;
          document.getElementById('count-paused').textContent = pausedCount;

          if (!endpoints || !endpoints.length) {
            const hasFilters = document.getElementById('endpoint-search').value || document.getElementById('endpoint-filter').value !== 'all';
            container.innerHTML = `<div class="text-center py-12 text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">${hasFilters ? 'No endpoints match your filters.' : 'No endpoints yet. Add one to get started.'}</div>`;
            return;
          }

          // Remove placeholder if present
          if (
            container.children.length === 1 &&
            container.children[0].classList.contains("text-center")
          ) {
            container.innerHTML = "";
          }

          // Track which IDs are in the new dataset
          const currentIds = new Set(endpoints.map((ep) => ep.id.toString()));

          // Remove cards that are no longer in the dataset
          Array.from(container.children).forEach((child) => {
            if (!child.id.startsWith("card-")) return;
            const id = child.id.replace("card-", "");
            if (!currentIds.has(id)) {
              container.removeChild(child);
            }
          });

          const iconHistory = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
          const iconEdit = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`;
          const iconPause = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
          const iconPlay = `<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
          const iconDelete = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`;

          // Update or create cards
          endpoints.forEach((ep) => {
            const isUp = ep.is_up === true;
            const isDown = ep.is_up === false;
            const statusColor = isUp
              ? "bg-green-500"
              : isDown
                ? "bg-red-500"
                : "bg-gray-300";
            const statusText = isUp ? "UP" : isDown ? "DOWN" : "UNKNOWN";
            const uptime =
              ep.uptime_30d !== null ? ep.uptime_30d.toFixed(2) + "%" : "—";
            const respTime =
              ep.response_time_ms !== null ? ep.response_time_ms + " ms" : "—";
            const lastChecked = timeAgo(ep.checked_at);
            const lastCheckedTitle = ep.checked_at
              ? new Date(ep.checked_at).toLocaleString()
              : "Never";
            const pauseText = ep.paused ? "Resume" : "Pause";
            const opacity = ep.paused ? "opacity-60" : "opacity-100";
            const pausedBadgeHtml = ep.paused
              ? `<span class="bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400 text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wider border border-yellow-200 dark:border-yellow-800">Paused</span>`
              : "";
            const pausedBadge = `<span id="paused-badge-${ep.id}">${pausedBadgeHtml}</span>`;

            const notifierCount = ep.notifier_ids ? ep.notifier_ids.length : 0;
            const notifiersBadge =
              notifierCount > 0
                ? `<span id="notifier-badge-${ep.id}" class="bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400 px-2 py-0.5 rounded text-xs flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg> ${notifierCount}</span>`
                : `<span id="notifier-badge-${ep.id}"></span>`;

            const safeName = escapeHtml(ep.name);
            const safeUrl = escapeHtml(ep.url);

            let existingCard = document.getElementById(`card-${ep.id}`);
            if (existingCard) {
              // Update classes dynamically
              existingCard.className = `bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 ${opacity} transition`;
              const dot = document.getElementById(`status-dot-${ep.id}`);
              if (dot)
                dot.className = `inline-block w-3 h-3 rounded-full ${statusColor} shadow-sm ${isUp ? "pulse" : ""}`;

              const title = document.getElementById(`title-${ep.id}`);
              if (title) title.textContent = safeName;

              const urlLink = document.getElementById(`url-${ep.id}`);
              if (urlLink) {
                urlLink.textContent = safeUrl;
                urlLink.href = safeUrl;
              }

              const badgeContainer = document.getElementById(
                `notifier-container-${ep.id}`,
              );
              if (badgeContainer && badgeContainer.innerHTML !== notifiersBadge) {
                badgeContainer.innerHTML = notifiersBadge;
              }

              const textStatus = document.getElementById(`status-text-${ep.id}`);
              if (textStatus) {
                textStatus.textContent = statusText;
                textStatus.className = `font-medium ${isUp ? 'text-green-600 dark:text-green-400' : isDown ? 'text-red-600 dark:text-red-400' : 'text-gray-500 dark:text-gray-400'}`;
              }

              const textResp = document.getElementById(`resp-text-${ep.id}`);
              if (textResp) textResp.textContent = respTime;

              const textUptime = document.getElementById(`uptime-text-${ep.id}`);
              if (textUptime) textUptime.textContent = uptime;

              const textChecked = document.getElementById(
                `checked-text-${ep.id}`,
              );
              if (textChecked) {
                textChecked.textContent = lastChecked;
                textChecked.title = lastCheckedTitle;
              }

              const pausedBadgeEl = document.getElementById(`paused-badge-${ep.id}`);
              if (pausedBadgeEl) pausedBadgeEl.innerHTML = pausedBadgeHtml;

              const btnPause = document.getElementById(`btn-pause-${ep.id}`);
              if (btnPause) {
                btnPause.title = pauseText;
                btnPause.innerHTML = ep.paused ? iconPlay : iconPause;
              }

              // Re-bind the edit button with fresh data
              const btnEdit = document.getElementById(`btn-edit-${ep.id}`);
              if (btnEdit) {
                btnEdit.onclick = () =>
                  editEndpoint(
                    ep.id,
                    ep.type || "http",
                    safeName,
                    safeUrl,
                    ep.interval_seconds,
                    ep.fail_threshold,
                    ep.notifier_ids || [],
                  );
              }
            } else {
              // Create new card
              const cardHtml = `
              <div class="flex items-start gap-3">
                <div class="mt-1">
                  <span id="status-dot-${ep.id}" class="inline-block w-3 h-3 rounded-full ${statusColor} shadow-sm ${isUp ? "pulse" : ""}"></span>
                </div>
                <div class="min-w-0 flex-1">
                  <div class="flex flex-wrap items-center justify-between gap-x-2 gap-y-1">
                    <div class="flex items-center gap-2 min-w-0">
                      <h3 id="title-${ep.id}" class="font-semibold text-gray-900 dark:text-white text-base truncate">${safeName}</h3>
                      <div id="notifier-container-${ep.id}">${notifiersBadge}</div>
                      ${pausedBadge}
                    </div>
                    <div class="flex items-center gap-0.5 flex-shrink-0">
                      <button onclick="showDetail(${ep.id}, '${safeName}')" title="History" class="p-1.5 rounded-md text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-600 dark:hover:text-gray-300 transition">
                        ${iconHistory}
                      </button>
                      <button id="btn-edit-${ep.id}" onclick='editEndpoint(${ep.id}, "${ep.type || "http"}", "${safeName.replace(/"/g, "&quot;")}", "${safeUrl.replace(/"/g, "&quot;")}", ${ep.interval_seconds}, ${ep.fail_threshold}, ${JSON.stringify(ep.notifier_ids || []).replace(/"/g, "&quot;")})' title="Edit" class="p-1.5 rounded-md text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-600 dark:hover:text-gray-300 transition">
                        ${iconEdit}
                      </button>
                      <button id="btn-pause-${ep.id}" onclick="togglePause(${ep.id})" title="${pauseText}" class="p-1.5 rounded-md text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-600 dark:hover:text-gray-300 transition">
                        ${ep.paused ? iconPlay : iconPause}
                      </button>
                      <button onclick="deleteEndpoint(${ep.id})" title="Delete" class="p-1.5 rounded-md text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-600 dark:hover:text-red-400 transition">
                        ${iconDelete}
                      </button>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-xs font-mono font-medium px-1.5 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-600">
                      ${(ep.type || 'http').toUpperCase()}
                    </span>
                    ${(ep.type || 'http') === 'http' 
                      ? `<a id="url-${ep.id}" href="${safeUrl}" target="_blank" class="text-sm text-gray-500 dark:text-gray-400 hover:text-green-700 dark:hover:text-green-400 hover:underline break-all transition">${safeUrl}</a>` 
                      : `<span id="url-${ep.id}" class="text-sm text-gray-500 dark:text-gray-400 break-all">${safeUrl}</span>`}
                  </div>
                  <div class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                    <span id="status-text-${ep.id}" class="font-medium ${isUp ? 'text-green-600 dark:text-green-400' : isDown ? 'text-red-600 dark:text-red-400' : ''}">${statusText}</span>
                    <span class="text-gray-300 dark:text-gray-600 mx-1">·</span>
                    <span id="resp-text-${ep.id}">${respTime}</span>
                    <span class="text-gray-300 dark:text-gray-600 mx-1">·</span>
                    <span id="uptime-text-${ep.id}" title="30-day Uptime">${uptime}</span>
                    <span class="text-gray-300 dark:text-gray-600 mx-1">·</span>
                    <span id="checked-text-${ep.id}" title="${lastCheckedTitle}">${lastChecked}</span>
                  </div>
                  <div class="mt-2 flex flex-wrap items-center gap-0.5 overflow-hidden history-container" id="history-${ep.id}">
                    <span class="text-xs text-gray-400 dark:text-gray-500 italic">Loading history…</span>
                  </div>
                </div>
              </div>
            `;

              const newCard = document.createElement("div");
              newCard.id = `card-${ep.id}`;
              newCard.className = `bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 ${opacity} transition`;
              newCard.innerHTML = cardHtml;
              container.appendChild(newCard);
            }
          });

          // Fetch ping history for each endpoint in the background
          endpoints.forEach((ep) => loadHistory(ep.id));
        }

        async function openEndpointModal() {
          document.getElementById("modal-title").textContent = "Add Endpoint";
          document.getElementById("endpoint-form").reset();
          document.getElementById("endpoint-id").value = "";
          document.getElementById("type").value = "http";
          updateEndpointFormFields();
          await populateNotifierCheckboxes([]);

          const modal = document.getElementById("modal");
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        async function editEndpoint(
          id,
          type,
          name,
          url,
          interval,
          failThreshold,
          notifierIds,
        ) {
          document.getElementById("modal-title").textContent = "Edit Endpoint";
          document.getElementById("endpoint-id").value = id;
          document.getElementById("type").value = type || "http";
          document.getElementById("name").value = name;
          document.getElementById("url").value = url;
          document.getElementById("interval").value = interval;
          document.getElementById("fail-threshold").value = failThreshold;
          updateEndpointFormFields();

          await populateNotifierCheckboxes(notifierIds);

          const modal = document.getElementById("modal");
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        function updateEndpointFormFields() {
          const type = document.getElementById("type").value;
          const urlLabel = document.getElementById("url-label");
          const urlInput = document.getElementById("url");
          
          if (type === "tcp") {
            urlLabel.textContent = "Address:Port";
            urlInput.placeholder = "e.g., 192.168.1.50:22 or db.example.com:5432";
          } else {
            urlLabel.textContent = "URL";
            urlInput.placeholder = "https://api.example.com/health";
          }
        }

        function closeModal() {
          const modal = document.getElementById("modal");
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }

        async function populateNotifierCheckboxes(selectedIds) {
          const container = document.getElementById("endpoint-notifiers-list");

          // Fetch fresh list if empty
          if (globalNotifiers.length === 0) {
            try {
              const res = await fetch("/api/notifiers");
              if (res.ok) globalNotifiers = await res.json();
            } catch (e) {}
          }

          if (globalNotifiers.length === 0) {
            container.innerHTML = `<div class="text-gray-500 italic px-2">No notifiers created yet.</div>`;
            return;
          }

          container.innerHTML = globalNotifiers
            .map((n) => {
              const isChecked = selectedIds.includes(n.id) ? "checked" : "";
              return `
            <label class="flex items-center gap-2 p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded cursor-pointer transition">
              <input type="checkbox" name="notifiers" value="${n.id}" ${isChecked} class="w-4 h-4 text-green-600 rounded border-gray-300 dark:border-gray-600 dark:bg-gray-700 focus:ring-green-500">
              <span class="flex-1 text-gray-800 dark:text-gray-200">${escapeHtml(n.name)}</span>
              <span class="text-xs bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400 px-2 py-0.5 rounded uppercase tracking-wider">${n.type}</span>
            </label>
          `;
            })
            .join("");        }

        async function saveEndpoint(e) {
          e.preventDefault();
          const id = document.getElementById("endpoint-id").value;

          // Gather checked notifiers
          const checkboxes = document.querySelectorAll(
            'input[name="notifiers"]:checked',
          );
          const notifier_ids = Array.from(checkboxes).map((cb) =>
            parseInt(cb.value, 10),
          );

          const payload = {
            type: document.getElementById("type").value,
            name: document.getElementById("name").value,
            url: document.getElementById("url").value,
            interval_seconds: parseInt(
              document.getElementById("interval").value,
              10,
            ),
            fail_threshold: parseInt(
              document.getElementById("fail-threshold").value,
              10,
            ),
            notifier_ids: notifier_ids,
          };

          const url = id ? `/api/endpoints/${id}` : "/api/endpoints";
          const method = id ? "PUT" : "POST";

          try {
            const res = await fetch(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const err = await res.json();
              alert(err.error || "Failed to save");
              return;
            }
            closeModal();
            fetchEndpoints();
          } catch (e) {
            alert("Network error");
          }
        }

        // --- Notifiers Logic ---
        async function fetchNotifiers() {
          if (
            document.getElementById("view-notifiers").classList.contains("hidden")
          )
            return;
          try {
            const res = await fetch("/api/notifiers");
            const data = await res.json();
            globalNotifiers = data; // Update cache
            renderNotifiers(data);
          } catch (e) {
            console.error("fetch notifiers error", e);
          }
        }

        function renderNotifiers(notifiers) {
          const container = document.getElementById("notifiers-container");
          if (!notifiers || !notifiers.length) {
            container.innerHTML = `<div class="col-span-full text-center py-16 text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">No notifiers yet. Add Telegram or Pushover.</div>`;
            return;
          }

          container.innerHTML = notifiers
            .map((n) => {
              return `
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-5 transition flex flex-col h-full">
              <div class="flex items-center justify-between mb-2">
                <h3 class="font-semibold text-gray-900 dark:text-white text-lg truncate pr-2">${escapeHtml(n.name)}</h3>
                <span class="text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-400 font-bold px-2 py-1 rounded border border-transparent dark:border-blue-800 uppercase tracking-wider">${n.type}</span>
              </div>
              <div class="text-xs text-gray-400 dark:text-gray-500 mb-4 flex-1">
                Created: ${new Date(n.created_at).toLocaleDateString()}
              </div>
              <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-700 mt-auto">
                <button onclick="testNotifier(${n.id})" class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition flex items-center gap-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                  Test
                </button>
                <div class="flex gap-2">
                  <button onclick='editNotifier(${JSON.stringify(n).replace(/'/g, "&apos;")})' class="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition">Edit</button>
                  <button onclick="deleteNotifier(${n.id})" class="text-sm font-medium text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 transition">Delete</button>
                </div>
              </div>
            </div>
          `;
            })
            .join("");
        }

        function openNotifierModal() {
          document.getElementById("notifier-modal-title").textContent =
            "Add Notifier";
          document.getElementById("notifier-form").reset();
          document.getElementById("notifier-id").value = "";
          renderNotifierFields(); // render default type (TELEGRAM)

          const modal = document.getElementById("notifier-modal");
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        function editNotifier(n) {
          document.getElementById("notifier-modal-title").textContent =
            "Edit Notifier";
          document.getElementById("notifier-id").value = n.id;
          document.getElementById("notifier-name").value = n.name;
          document.getElementById("notifier-type").value = n.type;

          renderNotifierFields(n.config_json);

          const modal = document.getElementById("notifier-modal");
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        function closeNotifierModal() {
          const modal = document.getElementById("notifier-modal");
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }

        function renderNotifierFields(configJsonStr = "{}") {

          const container = document.getElementById("notifier-dynamic-fields");
          let config = {};
          try {
            config = JSON.parse(configJsonStr);
          } catch (e) {}

          if (type === "TELEGRAM") {
            container.innerHTML = `
            <div>
              <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Bot Token</label>
              <input type="text" id="config-bot-token" required placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11" value="${escapeHtml(config.bot_token)}" class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">

              <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Chat ID</label>
              <input type="text" id="config-chat-id" required placeholder="-1001234567890" value="${escapeHtml(config.chat_id)}" class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">

            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">User Key</label>
              <input type="text" id="config-user-key" required placeholder="uQiRz..." value="${escapeHtml(config.user_key)}" class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Priority (Optional)</label>
              <select id="config-priority" class="w-full bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="0" ${config.priority === 0 ? "selected" : ""}>Normal</option>
                <option value="1" ${config.priority === 1 ? "selected" : ""}>High</option>
                <option value="-1" ${config.priority === -1 ? "selected" : ""}>Low</option>
              </select>
            </div>

        async function saveNotifier(e) {
          e.preventDefault();
          const id = document.getElementById("notifier-id").value;
          const type = document.getElementById("notifier-type").value;

          let config = {};
          if (type === "TELEGRAM") {
            config = {
              bot_token: document.getElementById("config-bot-token").value.trim(),
              chat_id: document.getElementById("config-chat-id").value.trim(),
            };
          } else if (type === "PUSHOVER") {
            config = {
              app_token: document.getElementById("config-app-token").value.trim(),
              user_key: document.getElementById("config-user-key").value.trim(),
              priority:
                parseInt(document.getElementById("config-priority").value, 10) ||
                0,
            };
          }

          const payload = {
            name: document.getElementById("notifier-name").value,
            type: type,
            config_json: JSON.stringify(config),
          };

          const url = id ? `/api/notifiers/${id}` : "/api/notifiers";
          const method = id ? "PUT" : "POST";

          try {
            const res = await fetch(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const err = await res.json();
              alert(err.error || "Failed to save notifier");
              return;
            }
            closeNotifierModal();
            fetchNotifiers();
          } catch (e) {
            alert("Network error");
          }
        }

        async function deleteNotifier(id) {
          if (
            !confirm(
              "Delete this notifier? Any endpoints using it will stop receiving alerts to this channel.",
            )
          )
            return;
          try {
            await fetch(`/api/notifiers/${id}`, { method: "DELETE" });
            fetchNotifiers();
          } catch (e) {
            alert("Failed to delete");
          }
        }

        async function testNotifier(id) {
          try {
            const res = await fetch(`/api/notifiers/${id}/test`, {
              method: "POST",
            });
            if (!res.ok) {
              const err = await res.json();
              alert(err.error || "Test failed");
              return;
            }
            alert("Test notification sent successfully!");
          } catch (e) {
            alert("Network error during test");
          }
        }

        // --- Helpers (Pause, Delete, History) ---
        async function loadHistory(id) {
          try {
            const res = await fetch(`/api/endpoints/${id}/history?limit=40`);
            const data = await res.json();
            const container = document.getElementById(`history-${id}`);
            if (!container) return;
            if (!Array.isArray(data) || data.length === 0) {
              container.innerHTML = `<span class="text-xs text-gray-400">No history yet</span>`;
              return;
            }
            // Reverse so oldest is leftmost
            const items = data.slice().reverse();
            container.innerHTML = items
              .map((h) => {
                const color = h.is_up ? "bg-green-500" : "bg-red-500";
                const timeStr = new Date(h.checked_at).toLocaleString();
                return `<div title="${timeStr}" class="w-1.5 h-3 sm:w-2 sm:h-3.5 rounded-sm ${color} flex-shrink min-w-[2px] opacity-80 hover:opacity-100 transition-opacity"></div>`;
              })
              .join("");
          } catch (e) {
            console.error("history fetch error", e);
          }
        }

        function timeAgo(dateString) {
          if (!dateString) return "Never";
          const date = new Date(dateString);
          const now = new Date();
          const seconds = Math.floor((now - date) / 1000);
          if (seconds < 10) return "Just now";
          if (seconds < 60) return `${seconds}s ago`;
          const minutes = Math.floor(seconds / 60);
          if (minutes < 60) return `${minutes}m ago`;
          const hours = Math.floor(minutes / 60);
          if (hours < 24) return `${hours}h ago`;
          const days = Math.floor(hours / 24);
          if (days < 30) return `${days}d ago`;
          return date.toLocaleDateString();
        }

        function escapeHtml(text) {
          if (!text) return "";
          return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        async function togglePause(id) {
          try {
            await fetch(`/api/endpoints/${id}/pause`, { method: "POST" });
            fetchEndpoints();
          } catch (e) {
            alert("Failed to pause/resume");
          }
        }

        async function deleteEndpoint(id) {
          if (!confirm("Delete this endpoint?")) return;
          try {
            await fetch(`/api/endpoints/${id}`, { method: "DELETE" });
            fetchEndpoints();
          } catch (e) {
            alert("Failed to delete");
          }
        }

        async function showDetail(id, name) {
          try {
            const res = await fetch(`/api/endpoints/${id}/checks?limit=50`);
            const checks = await res.json();
            document.getElementById("detail-title").textContent =
              `History: ${name}`;
            const tbody = document.getElementById("detail-body");
            if (!checks.length) {
              tbody.innerHTML = `<tr><td colspan="4" class="px-4 py-4 text-center text-gray-500 dark:text-gray-400">No checks yet.</td></tr>`;
            } else {
              tbody.innerHTML = checks
                .map((c) => {
                  const timeStr = new Date(c.checked_at).toLocaleString();
                  const status = c.is_up
                    ? '<span class="text-green-600 font-medium">UP</span>'
                    : '<span class="text-red-600 font-medium">DOWN</span>';
                  const code = c.status_code !== null ? c.status_code : "—";
                  return `<tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                <td class="px-4 py-3 whitespace-nowrap">${timeStr}</td>
                <td class="px-4 py-3">${status}</td>
                <td class="px-4 py-3">${code}</td>
                <td class="px-4 py-3">${c.response_time_ms} ms</td>
              </tr>`;
                })
                .join("");
            }
            const modal = document.getElementById("detail-modal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
          } catch (e) {
            alert("Failed to load history");
          }
        }

        function closeDetail() {
          const modal = document.getElementById("detail-modal");
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }

        // Init
        fetchEndpoints();
        refreshInterval = setInterval(() => {
          fetchEndpoints();
        }, 5000);
    </script>
  </body>
</html>
